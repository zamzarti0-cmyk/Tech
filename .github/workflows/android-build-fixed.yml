steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Java (required for Android build)
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '11'

  - name: Cache Pub packages
    uses: actions/cache@v4
    with:
      path: |
        ~/.pub-cache
        ~/.pub-cache/bin
      key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}

  - name: Install system dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends unzip xz-utils

  - name: Set up Flutter (pin specific version)
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.10.5'
      channel: 'stable'
      cache: true

  - name: Verify Flutter
    run: |
      flutter --version
      flutter doctor -v

  - name: Install dependencies
    run: flutter pub get

  - name: Build debug APK
    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
    run: flutter build apk --debug --no-shrink

  - name: Create Release
    id: create_release
    uses: actions/create-release@v1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      tag_name: debug-${{ github.run_number }}
      release_name: Debug Build ${{ github.run_number }}
      body: "Automated debug build from workflow run ${{ github.run_id }}"
      draft: false
      prerelease: true

  - name: Upload APK to Release
    uses: actions/upload-release-asset@v1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      asset_path: build/app/outputs/flutter-apk/app-debug.apk
      asset_name: holistq-debug.apk
      asset_content_type: application/vnd.android.package-archive

  - name: Upload debug APK artifact
    uses: actions/upload-artifact@v4
    with:
      name: holistq-debug-apk
      path: build/app/outputs/flutter-apk/app-debug.apk
      retention-days: 7
